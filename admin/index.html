<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda Webserver | Authenticate</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="./javascript/auth.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            flex-direction: column;
        }

        .auth-container {
            width: 100%;
            max-width: 320px;
            padding: 20px;
        }

        h1 {
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            color: #5f5f5f;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #595959;
            margin-bottom: 1rem;
        }

        .checkbox-container input {
            width: auto;
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.75rem;
            color: #5f5f5f;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h1>Koda Webserver - Login</h1>

        <select id="usertype">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <label class="checkbox-container">
            <input type="checkbox" id="rememberme"> Stay logged in for 7 days
        </label>

        <button id="loginbtn" disabled>Login</button>
    </div>

    <footer>
        Powered by &copy; 2026 KodaDNS Open Source Systems
    </footer>
</body>

</html>
